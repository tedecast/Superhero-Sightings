<!doctype html>
<html lang="en" xmlns:th="http://www.thymeleaf.org">
    <head>
        <!-- Required meta tags -->
        <meta charset="utf-8">
        <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

        <!-- Bootstrap CSS -->
        <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/css/bootstrap.min.css" integrity="sha384-MCw98/SFnGE8fJT3GXwEOngsV7Zt27NXFoaoApmYm81iuXoPkFOJwJ8ERdknLPMO" crossorigin="anonymous">

        <title>Supers</title>
    </head>
    <body>
        <!-- Main Body of Page -->
        <div class="container">
            <div class="row m-4">
                <div class="col text-center border border-dark">
                    <h1><a href="/" class="text-dark">Super Sightings</a></h1>
                </div>
            </div>
            <div class="row m-4 border border-dark">
                <div class="col text-center m-3">
                    <a href="supers" class="btn btn-outline-primary btn-lg">Supers</a>
                </div>
                <div class="col text-center m-3">
                    <a href="powers" class="btn btn-outline-primary btn-lg">Powers</a>
                </div>
                <div class="col text-center m-3">
                    <a href="organizations" class="btn btn-outline-primary btn-lg">Organizations</a>
                </div>
                <div class="col text-center m-3">
                    <a href="locations" class="btn btn-outline-primary btn-lg">Locations</a>
                </div>
                <div class="col text-center m-3">
                    <a href="sightings" class="btn btn-outline-primary btn-lg">Sightings</a>
                </div>
            </div>

            <!--Add Super-->
            <div class="row m-4 border border-dark">
                <div class="col-3 text-center m-3">
                    <span class="h3">Add Super</span>
                </div>
                <div class="col-7 text-center m-3">
                    <form action="addSuper" method="POST">  
                        <!--Type-->
                        <div class="form-group row">
                            <label for="superType" class="col-3 col-form-label font-weight-bold">Type</label>
                            <select id="superType" name="superType" class="ml-3 mb-1 text-center" required>
                                <option disabled selected value="type">Choose Type</option>
                                <option value="Hero">Hero</option>
                                <option value ="Villain">Villain</option>
                            </select>
                        </div>
                        <!--Name-->
                        <div class="form-group row">
                            <label for="superName" class="col-3 col-form-label font-weight-bold">
                                Super Name</label>
                            <div class="col-9">
                                <input type="text" name="superName" 
                                       id="superName" class="form-control"/>
                            </div>
                        </div>
                        <!--Description-->
                        <div class="form-group row">
                            <label for="superDescription" class="col-3 col-form-label font-weight-bold">Description</label>
                            <div class="col-9">
                                <input type="text" name="superDescription" 
                                       id="superDescription" class="form-control"/>
                            </div>
                        </div>
                        <!--Power-->
                        <div class="form-group row">
                            <label for="power" class="col-3 col-form-label font-weight-bold">
                                Power</label>
                            <div class="col-9">
                                <select id="power" name="powerID" class="form-control">
                                    <option disabled selected value>Choose Power</option>
                                    <option th:each="power : ${powers}" 
                                            th:value="${power.powerID}" 
                                            th:text="${power.name + ': ' 
                                            + power.description}">Power</option>
                                    <option value="No Power">No Power</option>
                                </select>
                            </div>
                        </div>
                        <!--Organizations-->
                        <div class="form-group row">
                            <label for="organizations" class="col-3 col-form-label font-weight-bold">Organizations</label>
                            <div class="col-9">
                                <select multiple id="organizations" name="organizationID" class="form-control">
                                    <option th:each="organization : ${organizations}" 
                                            th:value="${organization.organizationID}" 
                                            th:text="${organization.type + ': ' 
                                            + organization.name}">Organization</option>
                                </select>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary mt-1">Add Super</button>
                    </form>
                </div>
            </div>

            <!-- Super Table -->
            <div class="row m-4 border border-dark">
                <div class="col text-center m-3">
                    <h1 class="col text-center m-2">Supers</h1>
                    <table class="table table-striped">
                        <thead>
                            <tr>
                                <th>Type</th>
                                <th>Name</th>
                                <th>Power</th>
                                <th>Description</th>
                            </tr>
                        </thead>
                        <tbody>
                            <tr th:each="superhero : ${supers}">
                                <td th:text="${superhero.type}">Type</td>
                                <td th:text="${superhero.name}">Name</td>
                                <td th:text="${superhero.power} ? ${superhero.power.name} : 'No Power'">Power Name</td>
                                <td th:text="${superhero.description}">Description</td>
                                <td><a href="#" th:href="@{detailsSuper(superID=${superhero.superID})}">Details</a></td>
                                <td><a href="#" th:href="@{editSuper(superID=${superhero.superID})}">Edit</a></td>
                                <!--Delete Super-->
                                <td><a href="#" data-toggle="modal" th:attr="data-target='#recordDeleteModal'+${superhero.superID}">Delete</a>
                                    <!-- Modal For Delete ^ -->
                                    <div class="modal fade" th:attr="id='recordDeleteModal'+${superhero.superID}" tabindex="-1" role="dialog" aria-labelledby="recordDeleteModalLabel" aria-hidden="true">
                                        <div class="modal-dialog" role="document">
                                            <div class="modal-content">
                                                <div class="modal-header">
                                                    <h5 class="modal-title align-content-center" id="recordDeleteModalLabel">Delete Super Confirmation</h5>
                                                    <button type="button" class="close" data-dismiss="modal" aria-label="Close">
                                                        <span aria-hidden="true">&times;</span>
                                                    </button>
                                                </div>
                                                <div class="modal-body text-center">
                                                    <h5>Are you sure you want to delete this Super?</h5>
                                                    <span class="font-weight-bold" th:text="${superhero.name}">Power Name</span>
                                                    <div>
                                                        <span th:text="${superhero.description}">Power Description</span>
                                                    </div>

                                                </div>
                                                <div class="modal-footer">
                                                    <button type="button" class="btn btn-secondary " data-dismiss="modal">Cancel</button>
                                                    <a href="#" class="btn btn-primary " th:href="@{/deleteSuper(superID=${superhero.superID})}">OK</a>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </td>
                            </tr>
                            <!-- Modal end --> 
                        </tbody>
                    </table>
                </div>
            </div>
        </div> 

        <!-- End main body -->

        <!-- Optional JavaScript -->
        <!-- jQuery first, then Popper.js, then Bootstrap JS -->
        <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js" integrity="sha384-q8i/X+965DzO0rT7abK41JStQIAqVgRVzpbzo5smXKp4YfRvH+8abtTE1Pi6jizo" crossorigin="anonymous"></script>
        <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.3/umd/popper.min.js" integrity="sha384-ZMP7rVo3mIykV+2+9J3UJ46jBk0WLaUAdn689aCwoqbBJiSnjAK/l8WvCWPIPm49" crossorigin="anonymous"></script>
        <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.1.3/js/bootstrap.min.js" integrity="sha384-ChfqqxuZUCnJSK3+MXmPNIyE6ZbWh2IMqE241rYiqJxyMiZ6OW/JmZQ5stwEULTy" crossorigin="anonymous"></script>
    </body>
</html>
